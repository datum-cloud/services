apiVersion: services.miloapis.com/v1alpha1
kind: MeterDefinition
metadata:
  name: e2e-compute-instance-cpu-seconds
spec:
  meterName: compute.miloapis.com/instance/cpu-seconds
  phase: Published
  displayName: Compute Instance CPU Time (Updated)
  owner:
    service: storage.miloapis.com
  measurement:
    aggregation: Sum
    unit: s
    dimensions:
      - region
      - instance.type
      - resource.tier
  billing:
    consumedUnit: s
    pricingUnit: h
