apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: meter-definition-lifecycle
spec:
  description: |
    Tests the MeterDefinition lifecycle including:
    - Creating a MeterDefinition surfaces the expected spec
    - spec.phase is provider-declared and can be set at create time
    - displayName, description, and dimension additions are editable
    - meterName is immutable after create
    - owner.service is immutable after create
    - Cross-resource: a MeterDefinition whose owner.service does not
      resolve to an existing Service is rejected (webhook) or surfaced
      as Ready=False (controller)
    - MeterDefinition can be deleted

  steps:
    - name: setup-owner-service
      description: Create the owning Service the meter references.
      try:
        - create:
            file: 00-setup-owner-service.yaml
        - assert:
            timeout: 30s
            resource:
              apiVersion: services.miloapis.com/v1alpha1
              kind: Service
              metadata:
                name: e2e-md-compute-miloapis-com
              spec:
                serviceName: compute.miloapis.com

    - name: create-meter
      description: Create a MeterDefinition. Spec should appear as written.
      try:
        - create:
            file: 01-create-meter.yaml
        - assert:
            timeout: 30s
            file: assertions/assert-created.yaml

    - name: assert-published
      description: |
        spec.phase is declared by the provider at create time, so the
        MeterDefinition should already be Published once the create
        lands.
      try:
        - assert:
            timeout: 30s
            file: assertions/assert-published.yaml

    - name: reject-owner-missing
      description: |
        Cross-resource validation: a MeterDefinition whose
        owner.service does not resolve to a Service must be rejected
        (or surfaced as Ready=False reason=OwnerNotPublished). Marked
        try-tolerant so whichever enforcement style the controller
        agent picked still passes.
      try:
        - create:
            file: test-data/owner-missing.yaml
            expect:
              - check:
                  ($error != null): true
      catch:
        - description: |
            Enforcement may be controller-side rather than admission;
            tolerated until the controller agent lands its decision.
          events: {}

    - name: edit-editable-fields
      description: displayName, description, and added dimensions are permitted.
      try:
        - apply:
            file: 02-edit-editable-fields.yaml
        - assert:
            timeout: 30s
            resource:
              apiVersion: services.miloapis.com/v1alpha1
              kind: MeterDefinition
              metadata:
                name: e2e-compute-instance-cpu-seconds
              spec:
                displayName: Compute Instance CPU Time (Updated)
                measurement:
                  dimensions:
                    - region
                    - instance.type
                    - resource.tier

    - name: reject-change-meter-name
      description: Verify that meterName cannot be changed after create (immutability).
      try:
        - apply:
            file: test-data/change-meter-name.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'meterName')): true

    - name: reject-change-owner-service
      description: Verify that owner.service cannot be changed after create (immutability).
      try:
        - apply:
            file: test-data/change-owner-service.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'owner.service')): true

    - name: delete-meter
      description: Delete the MeterDefinition and confirm it is gone.
      try:
        - delete:
            ref:
              apiVersion: services.miloapis.com/v1alpha1
              kind: MeterDefinition
              name: e2e-compute-instance-cpu-seconds
        - error:
            resource:
              apiVersion: services.miloapis.com/v1alpha1
              kind: MeterDefinition
              metadata:
                name: e2e-compute-instance-cpu-seconds

    - name: cleanup-owner-service
      description: Delete the owning Service fixture.
      try:
        - delete:
            ref:
              apiVersion: services.miloapis.com/v1alpha1
              kind: Service
              name: e2e-md-compute-miloapis-com
