apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: monitored-resource-type-lifecycle
spec:
  description: |
    Tests the MonitoredResourceType lifecycle including:
    - Creating a MonitoredResourceType surfaces the expected spec
    - spec.phase is provider-declared and can be set at create time
    - displayName, description, and additive labels are editable
    - resourceTypeName is immutable after create
    - gvk.kind is immutable after create
    - Cross-resource: a MonitoredResourceType whose owner.service does
      not resolve to an existing Service is rejected (webhook) or
      surfaced as Ready=False (controller)
    - MonitoredResourceType can be deleted

  steps:
    - name: setup-owner-service
      description: Create the owning Service the monitored resource type references.
      try:
        - create:
            file: 00-setup-owner-service.yaml
        - assert:
            timeout: 30s
            resource:
              apiVersion: services.miloapis.com/v1alpha1
              kind: Service
              metadata:
                name: e2e-mrt-compute-miloapis-com
              spec:
                serviceName: compute.miloapis.com

    - name: create-resource-type
      description: Create a MonitoredResourceType. Spec should appear as written.
      try:
        - create:
            file: 01-create-resource-type.yaml
        - assert:
            timeout: 30s
            file: assertions/assert-created.yaml

    - name: assert-published
      description: |
        spec.phase is declared by the provider at create time, so the
        MonitoredResourceType should already be Published once the
        create lands.
      try:
        - assert:
            timeout: 30s
            file: assertions/assert-published.yaml

    - name: reject-owner-missing
      description: |
        Cross-resource validation: a MonitoredResourceType whose
        owner.service does not resolve to a Service must be rejected
        (or surfaced as Ready=False reason=OwnerNotPublished). Marked
        try-tolerant so whichever enforcement style the controller
        agent picked still passes.
      try:
        - create:
            file: test-data/owner-missing.yaml
            expect:
              - check:
                  ($error != null): true
      catch:
        - description: |
            Enforcement may be controller-side rather than admission;
            tolerated until the controller agent lands its decision.
          events: {}

    - name: edit-editable-fields
      description: displayName, description, and additive labels are permitted.
      try:
        - apply:
            file: 02-edit-editable-fields.yaml
        - assert:
            timeout: 30s
            resource:
              apiVersion: services.miloapis.com/v1alpha1
              kind: MonitoredResourceType
              metadata:
                name: e2e-compute-instance
              spec:
                displayName: Compute Instance (Updated)

    - name: reject-change-resource-type-name
      description: Verify that resourceTypeName cannot be changed after create.
      try:
        - apply:
            file: test-data/change-resource-type-name.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'resourceTypeName')): true

    - name: reject-change-gvk-kind
      description: Verify that gvk.kind cannot be changed after create.
      try:
        - apply:
            file: test-data/change-gvk-kind.yaml
            expect:
              - check:
                  ($error != null): true
                  (contains($error, 'gvk.kind')): true

    - name: delete-resource-type
      description: Delete the MonitoredResourceType and confirm it is gone.
      try:
        - delete:
            ref:
              apiVersion: services.miloapis.com/v1alpha1
              kind: MonitoredResourceType
              name: e2e-compute-instance
        - error:
            resource:
              apiVersion: services.miloapis.com/v1alpha1
              kind: MonitoredResourceType
              metadata:
                name: e2e-compute-instance

    - name: cleanup-owner-service
      description: Delete the owning Service fixture.
      try:
        - delete:
            ref:
              apiVersion: services.miloapis.com/v1alpha1
              kind: Service
              name: e2e-mrt-compute-miloapis-com
