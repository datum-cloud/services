name: E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    name: Chainsaw E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      TASK_X_REMOTE_TASKFILES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.24.0'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Spin up kind cluster
        run: task --yes test-infra:cluster-up

      - name: Build container image
        run: task dev:build

      - name: Load image into kind
        run: task dev:load

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.7.5

      - name: Install billing CRDs
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: |
          mkdir -p /tmp/billing-bundle
          flux pull artifact oci://ghcr.io/milo-os/billing-kustomize:v0.0.0-main \
            --output /tmp/billing-bundle \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
          task --yes test-infra:kubectl -- apply \
            -f /tmp/billing-bundle/base/crd/bases/billing.miloapis.com_meterdefinitions.yaml \
            -f /tmp/billing-bundle/base/crd/bases/billing.miloapis.com_monitoredresourcetypes.yaml

      - name: Deploy services (e2e overlay)
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: |
          task --yes test-infra:kubectl -- apply -k config/overlays/e2e
          task --yes test-infra:kubectl -- wait --for=condition=available \
            deployment/services-controller-manager \
            -n services-system --timeout=120s

      - name: Wait for webhook certificate to be ready
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: |
          task --yes test-infra:kubectl -- wait --for=condition=ready \
            certificate/services-serving-cert \
            -n services-system --timeout=120s

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.2.14

      - name: Run E2E tests
        env:
          KUBECONFIG: .test-infra/kubeconfig
        run: task e2e
