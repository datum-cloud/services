---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
    discovery.miloapis.com/parent-contexts: Project
  name: serviceentitlements.services.miloapis.com
spec:
  group: services.miloapis.com
  names:
    kind: ServiceEntitlement
    listKind: ServiceEntitlementList
    plural: serviceentitlements
    singular: serviceentitlement
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.serviceRef.name
      name: Service
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.origin
      name: Origin
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ServiceEntitlement is the Schema for the serviceentitlements API. A consumer
          project admin creates one ServiceEntitlement per service they want to use.
          The object is written into the consumer project's virtual control plane and
          the services operator reconciles it into the provider project.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ServiceEntitlementSpec defines the desired state of a ServiceEntitlement.
            properties:
              requestMessage:
                description: |-
                  RequestMessage is an optional human-readable message sent to the
                  provider when the service requires GatedByProvider approval.
                maxLength: 1024
                type: string
              serviceRef:
                description: ServiceRef identifies the Service the consumer project
                  wants to enable.
                properties:
                  name:
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - serviceRef
            type: object
          status:
            description: ServiceEntitlementStatus defines the observed state of a
              ServiceEntitlement.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  entitlement's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              dependencyOf:
                description: |-
                  DependencyOf is the metadata.name of the ServiceEntitlement that caused
                  this entitlement to be created when origin is Dependency.
                type: string
              entitledAt:
                description: EntitledAt is the time at which this entitlement became
                  Active.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed by the
                  controller.
                format: int64
                type: integer
              origin:
                description: |-
                  Origin indicates whether this entitlement was created directly by a
                  consumer admin or automatically as a dependency of another entitlement.
                enum:
                - Direct
                - Dependency
                type: string
              phase:
                description: Phase is the controller-observed lifecycle state of this
                  entitlement.
                enum:
                - PendingApproval
                - Active
                - Rejected
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
