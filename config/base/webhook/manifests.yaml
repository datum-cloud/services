---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-services-miloapis-com-v1alpha1-service
  failurePolicy: Fail
  name: mservice.kb.io
  rules:
  - apiGroups:
    - services.miloapis.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - services
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-services-miloapis-com-v1alpha1-meterdefinition
  failurePolicy: Fail
  name: vmeterdefinition.kb.io
  rules:
  - apiGroups:
    - services.miloapis.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - meterdefinitions
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-services-miloapis-com-v1alpha1-monitoredresourcetype
  failurePolicy: Fail
  name: vmonitoredresourcetype.kb.io
  rules:
  - apiGroups:
    - services.miloapis.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - monitoredresourcetypes
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-services-miloapis-com-v1alpha1-service
  failurePolicy: Fail
  name: vservice.kb.io
  rules:
  - apiGroups:
    - services.miloapis.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    - DELETE
    resources:
    - services
  sideEffects: None
