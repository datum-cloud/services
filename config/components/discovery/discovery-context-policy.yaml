apiVersion: discovery.miloapis.com/v1alpha1
kind: DiscoveryContextPolicy
metadata:
  name: services-resources
spec:
  rules:
    - group: services.miloapis.com
      resources: ["services", "serviceconfigurations"]
      contexts: ["Platform"]
    - group: services.miloapis.com
      resources: ["serviceentitlements", "serviceconsumers"]
      contexts: ["Project"]
