apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: billing
  namespace: flux-system
spec:
  interval: 1m
  url: oci://ghcr.io/milo-os/billing-kustomize
  ref:
    tag: v0.0.0-main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: billing-crds
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: OCIRepository
    name: billing
  path: ./base/crd/bases
  prune: false
